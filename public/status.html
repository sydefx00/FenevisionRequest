<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fenevision Request - Status</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: "Segoe UI", Arial, sans-serif;
    background: #e8e8e8;
    margin: 0;
    padding: 24px 12px 60px;
    color: #222;
  }
  .card {
    background: #fff;
    max-width: 640px;
    margin: 0 auto;
    border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    overflow: hidden;
  }
  .card-header {
    background: #0078d4;
    color: #fff;
    padding: 18px 24px;
    font-size: 20px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .card-header img { height: 28px; }
  .card-body { padding: 20px 24px 28px; }
  table { border-collapse: collapse; width: 100%; margin-bottom: 20px; }
  td { padding: 6px 0; vertical-align: top; }
  td.label { font-weight: 600; width: 130px; white-space: nowrap; }
  .badge { padding: 2px 8px; border-radius: 10px; font-size: 12px; font-weight: 600; }
  .badge-pending { background: #fff3cd; color: #8a6500; }
  .badge-approved { background: #dff6dd; color: #1e6b1e; }
  .badge-rejected { background: #fce8e8; color: #a92020; }
  .badge-skipped { background: #eee; color: #777; }
  .timeline-item { padding: 10px 0; border-bottom: 1px solid #eee; }
  .timeline-item:last-child { border-bottom: none; }
  #message { padding: 12px 14px; border-radius: 4px; font-size: 14px; background: #fce8e8; color: #a92020; }
</style>
</head>
<body>
  <div class="card">
    <div class="card-header"><img src="/midway-logo.png" alt="Midway"> Fenevision Request Status</div>
    <div class="card-body" id="card-body">Loading...</div>
  </div>

  <script>
    const id = window.location.pathname.split("/").pop();
    const cardBody = document.getElementById("card-body");

    function esc(value) {
      const div = document.createElement("div");
      div.textContent = value ?? "";
      return div.innerHTML;
    }

    function formatCT(value) {
      if (!value) return "";
      return new Intl.DateTimeFormat("en-US", {
        timeZone: "America/Chicago",
        dateStyle: "medium",
        timeStyle: "short",
      }).format(new Date(value)) + " CT";
    }

    function badge(status) {
      return `<span class="badge badge-${status}">${esc(status)}</span>`;
    }

    async function load() {
      try {
        const res = await fetch(`/api/status/${id}`);
        const data = await res.json();
        if (!res.ok) {
          cardBody.innerHTML = `<div id="message">${esc(data.error || "Request not found.")}</div>`;
          return;
        }
        render(data);
      } catch (err) {
        cardBody.innerHTML = `<div id="message">Unable to load request status.</div>`;
      }
    }

    function render({ request, approvals }) {
      const timeline = approvals
        .map(
          (a) => `
          <div class="timeline-item">
            <strong>Step ${a.step_number} - ${esc(a.approver_name)}</strong> ${badge(a.status)}
            ${a.decided_at ? `<div style="color:#666;font-size:12px;">${formatCT(a.decided_at)}</div>` : ""}
            ${a.comments ? `<div style="margin-top:4px;">${esc(a.comments)}</div>` : ""}
          </div>
        `
        )
        .join("");

      cardBody.innerHTML = `
        <table>
          <tr><td class="label">Request #</td><td>${request.id}</td></tr>
          <tr><td class="label">Status</td><td>${badge(request.status)}</td></tr>
          <tr><td class="label">Request Type</td><td>${esc(request.request_type)}</td></tr>
          <tr><td class="label">Urgency</td><td>${esc(request.urgency)}</td></tr>
          <tr><td class="label">Description</td><td>${esc(request.description)}</td></tr>
          <tr><td class="label">Submitted</td><td>${formatCT(request.created_at)}</td></tr>
        </table>
        <h3 style="font-size:14px;color:#0078d4;margin-bottom:6px;">Approval Timeline</h3>
        ${timeline}
      `;
    }

    load();
  </script>
</body>
</html>
