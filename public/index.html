<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fenevision Request Form</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: "Segoe UI", Arial, sans-serif;
    background: #e8e8e8;
    margin: 0;
    padding: 24px 12px 60px;
    color: #222;
  }
  .card {
    background: #fff;
    max-width: 640px;
    margin: 0 auto;
    border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    overflow: hidden;
  }
  .card-header {
    background: #0078d4;
    color: #fff;
    padding: 18px 24px;
  }
  .card-header .card-title { font-size: 20px; font-weight: 700; }
  .card-body { padding: 20px 24px 28px; }
  .field { margin-bottom: 14px; }
  .field label.field-label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 4px; }
  input[type="text"], input[type="email"], select, textarea {
    width: 100%;
    padding: 9px 10px;
    font-size: 14px;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-family: inherit;
  }
  textarea { min-height: 80px; resize: vertical; }
  .row { display: flex; gap: 16px; }
  .row .field { flex: 1; }
  .submit-btn {
    background: #0078d4;
    color: #fff;
    border: none;
    border-radius: 4px;
    padding: 12px 28px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
  }
  .submit-btn:hover { background: #006cbd; }
  .submit-btn:disabled { background: #aaa; cursor: default; }
  #success-banner, #error-banner {
    margin: 16px 0;
    padding: 12px 14px;
    border-radius: 4px;
    font-size: 14px;
    display: none;
  }
  #success-banner { background: #dff6dd; color: #1e6b1e; }
  #error-banner { background: #fce8e8; color: #a92020; }
  #success-banner a { color: #1e6b1e; font-weight: 700; }
</style>
</head>
<body>
  <div class="card">
    <div class="card-header">
      <div class="card-title">Fenevision Request Form</div>
    </div>
    <div class="card-body">
      <form id="request-form">

        <div class="field">
          <label class="field-label" for="submitted_by">Name</label>
          <input type="text" id="submitted_by" name="submitted_by" required>
        </div>

        <div class="field">
          <label class="field-label" for="submitted_by_email">Email</label>
          <input type="email" id="submitted_by_email" name="submitted_by_email" required>
        </div>

        <div class="row">
          <div class="field">
            <label class="field-label" for="request_type">Request Type</label>
            <select id="request_type" name="request_type" required>
              <option value="" disabled selected>Select...</option>
              <option>New User Access</option>
              <option>Permission Change</option>
              <option>Data Correction</option>
              <option>Report a Problem</option>
              <option>Training</option>
              <option>Other</option>
            </select>
          </div>
          <div class="field">
            <label class="field-label" for="urgency">Urgency</label>
            <select id="urgency" name="urgency" required>
              <option value="" disabled selected>Select...</option>
              <option>Low</option>
              <option>Medium</option>
              <option>High</option>
              <option>Critical</option>
            </select>
          </div>
        </div>

        <div class="field" id="other-type-field" style="display:none">
          <label class="field-label" for="request_type_other">Please specify</label>
          <input type="text" id="request_type_other" name="request_type_other">
        </div>

        <div class="field">
          <label class="field-label" for="description">Description</label>
          <textarea id="description" name="description" required></textarea>
        </div>

        <div class="field">
          <label class="field-label" for="notes">Notes (optional)</label>
          <textarea id="notes" name="notes"></textarea>
        </div>

        <div id="success-banner"></div>
        <div id="error-banner"></div>

        <button type="submit" class="submit-btn" id="submit-btn">Submit Request</button>
      </form>
    </div>
  </div>

  <script>
    const form = document.getElementById("request-form");
    const submitBtn = document.getElementById("submit-btn");
    const successBanner = document.getElementById("success-banner");
    const errorBanner = document.getElementById("error-banner");
    const requestType = document.getElementById("request_type");
    const otherTypeField = document.getElementById("other-type-field");
    const requestTypeOther = document.getElementById("request_type_other");

    requestType.addEventListener("change", () => {
      otherTypeField.style.display = requestType.value === "Other" ? "block" : "none";
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      successBanner.style.display = "none";
      errorBanner.style.display = "none";

      const data = Object.fromEntries(new FormData(form).entries());
      if (requestType.value === "Other" && requestTypeOther.value.trim()) {
        data.request_type = requestTypeOther.value.trim();
      }
      delete data.request_type_other;

      submitBtn.disabled = true;
      submitBtn.textContent = "Submitting...";

      try {
        const res = await fetch("/api/requests", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data),
        });
        const result = await res.json();
        if (!res.ok) throw new Error(result.error || "Submission failed.");

        successBanner.innerHTML = `Request submitted. Your request ID is #${result.id} - <a href="/status/${result.id}">Check status</a>`;
        successBanner.style.display = "block";
        form.reset();
        otherTypeField.style.display = "none";
      } catch (err) {
        errorBanner.textContent = err.message;
        errorBanner.style.display = "block";
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Submit Request";
      }
    });
  </script>
</body>
</html>
